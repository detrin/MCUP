site_name: MCUP
site_description: Monte Carlo Uncertainty Propagation for regression with measurement errors
site_author: Daniel Herman
repo_url: https://github.com/detrin/MCUP

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

exclude_docs: |
  superpowers/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            show_signature_annotations: false

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - User Guide:
    - Getting Started: guide/getting-started.md
    - Choosing an Estimator: guide/choosing-estimator.md
    - Method Comparison & Benchmarks: guide/method-comparison.md
    - Performance: guide/performance.md
  - Tutorials:
    - Sensor Calibration (y-errors): tutorials/sensor-calibration.md
    - Radioactive Decay (x+y errors): tutorials/radioactive-decay.md
    - Method Comparison (Deming): tutorials/method-comparison.md
    - Multivariable Regression: tutorials/multivariable-regression.md
  - API Reference:
    - WeightedRegressor: api/weighted.md
    - XYWeightedRegressor: api/xy_weighted.md
    - DemingRegressor: api/deming.md
    - DataGenerator: api/data_generator.md
  - About:
    - Changelog: about/changelog.md
